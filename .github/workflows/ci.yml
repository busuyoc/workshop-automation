name: Code Verification (CI)

on: [push, pull_request]

jobs:
  build:
    # Spin up one VM per OS, all in parallel.
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      # Runs on ALL three — no 'if', so it's unconditional.
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Linux ONLY: apt-get exists nowhere else.
      # macOS + Windows runners already ship a working gcc.
      - name: Install GCC (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc

      # Linux + macOS: same command, output binary has no extension.
      - name: Compile (Unix)
        if: runner.os != 'Windows'
        run: gcc c-bye/bye.c -o c-bye/bye

      # Windows ONLY: MinGW gcc, and the binary needs the .exe extension.
      - name: Compile (Windows)
        if: runner.os == 'Windows'
        run: gcc c-bye/bye.c -o c-bye/bye.exe

      # Linux + macOS: run the extensionless binary.
      - name: Run (Unix)
        if: runner.os != 'Windows'
        run: ./c-bye/bye

      # Windows ONLY: run the .exe (default shell here is PowerShell).
      - name: Run (Windows)
        if: runner.os == 'Windows'
        run: ./c-bye/bye.exe
